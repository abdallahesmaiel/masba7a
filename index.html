<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tasbih Pro | مسبحة إلكترونية برو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=El+Messiri:wght@400;600;700&family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables */
        :root {
            --primary-gold: #D4AF37;
            --secondary-gold: #FFD700;
            --dark-gold: #B8860B;
            --light-gold: #FFF8DC;
            --deep-green: #0A3D2E;
            --medium-green: #1B5E20;
            --light-green: #2E7D32;
            --black: #121212;
            --dark-gray: #1E1E1E;
            --medium-gray: #2D2D2D;
            --light-gray: #3D3D3D;
            --white: #F5F5F5;
            --shadow-heavy: 0 20px 50px rgba(0, 0, 0, 0.5);
            --shadow-medium: 0 10px 30px rgba(0, 0, 0, 0.3);
            --shadow-light: 0 5px 15px rgba(0, 0, 0, 0.2);
            --glow-gold: 0 0 30px rgba(212, 175, 55, 0.5);
            --border-radius: 20px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Almarai', sans-serif;
            background: linear-gradient(135deg, var(--black) 0%, var(--deep-green) 100%);
            color: var(--white);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        
        /* Luxury Container */
        .luxury-container {
            width: 100%;
            height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            background: 
                radial-gradient(circle at 20% 80%, rgba(212, 175, 55, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(27, 94, 32, 0.1) 0%, transparent 50%),
                linear-gradient(135deg, var(--dark-gray) 0%, var(--black) 100%);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: var(--shadow-heavy);
        }
        
        /* Gold Border Effect */
        .luxury-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 60%, rgba(212, 175, 55, 0.1) 100%);
            pointer-events: none;
            z-index: 0;
        }
        
        /* Luxury Header */
        .luxury-header {
            padding: 20px 25px;
            background: linear-gradient(180deg, rgba(30, 30, 30, 0.9) 0%, rgba(18, 18, 18, 0.9) 100%);
            border-bottom: 2px solid var(--primary-gold);
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
        }
        
        .luxury-header::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 10%;
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary-gold), transparent);
        }
        
        .app-title {
            text-align: center;
            margin-bottom: 12px;
        }
        
        .app-title h1 {
            font-family: 'El Messiri', serif;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-gold) 0%, var(--secondary-gold) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
            letter-spacing: 1px;
        }
        
        .app-subtitle {
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            color: var(--light-gold);
            opacity: 0.8;
            font-weight: 300;
            letter-spacing: 2px;
        }
        
        /* Deceased Section */
        .deceased-section {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50px;
            padding: 8px 15px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            backdrop-filter: blur(5px);
        }
        
        .deceased-section i {
            color: var(--primary-gold);
            font-size: 1.1rem;
        }
        
        #deceasedNameInput {
            background: transparent;
            border: none;
            color: var(--white);
            font-family: 'Almarai', sans-serif;
            font-size: 1rem;
            text-align: center;
            width: 170px;
            padding: 5px;
            border-bottom: 1px dashed rgba(212, 175, 55, 0.5);
            outline: none;
        }
        
        #deceasedNameInput::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }
        
        .save-name-btn {
            background: transparent;
            border: 1px solid var(--primary-gold);
            color: var(--primary-gold);
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Tajawal', sans-serif;
        }
        
        .save-name-btn:hover {
            background: var(--primary-gold);
            color: var(--black);
        }
        
        /* Main Content Area */
        .main-content {
            flex: 1;
            padding: 20px 20px 10px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            position: relative;
            z-index: 1;
        }
        
        /* Counter Display - Luxury Version */
        .counter-display-section {
            background: linear-gradient(135deg, rgba(30, 30, 30, 0.9) 0%, rgba(45, 45, 45, 0.7) 100%);
            border-radius: var(--border-radius);
            padding: 25px 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 
                var(--shadow-medium),
                inset 0 0 30px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .counter-display-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-gold), var(--secondary-gold), var(--primary-gold));
        }
        
        .counter-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
            color: var(--light-gold);
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 1px;
        }
        
        .counter-label i {
            color: var(--primary-gold);
            font-size: 1.5rem;
        }
        
        .counter-number {
            font-family: 'Tajawal', monospace;
            font-size: 6rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, var(--secondary-gold) 0%, var(--primary-gold) 50%, var(--secondary-gold) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 5px 20px rgba(212, 175, 55, 0.3);
            margin: 10px 0;
            letter-spacing: 3px;
            position: relative;
            cursor: pointer;
        }
        
        .counter-number::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 25%;
            width: 50%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-gold), transparent);
        }
        
        .current-dhikr {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
            font-family: 'El Messiri', serif;
            font-size: 1.8rem;
            color: var(--light-gold);
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.2);
        }
        
        /* Dedication Badge */
        .dedication-badge {
            background: rgba(212, 175, 55, 0.15);
            border-radius: 30px;
            padding: 10px 15px;
            margin: 15px 0 10px;
            font-size: 1rem;
            color: var(--secondary-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px dashed rgba(212, 175, 55, 0.4);
        }
        
        .dedication-badge i {
            font-size: 1.2rem;
        }
        
        /* Luxury Controls */
        .luxury-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
        }
        
        .luxury-btn {
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-family: 'Almarai', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            z-index: 1;
            letter-spacing: 1px;
        }
        
        .luxury-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, transparent 100%);
            opacity: 0;
            transition: var(--transition);
            z-index: -1;
        }
        
        .luxury-btn:hover::before {
            opacity: 1;
        }
        
        .luxury-btn:active {
            transform: translateY(2px);
        }
        
        .btn-primary {
            grid-column: span 2;
            background: linear-gradient(135deg, var(--primary-gold) 0%, var(--dark-gold) 100%);
            color: var(--black);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
        }
        
        .btn-primary:hover {
            box-shadow: var(--glow-gold);
            transform: translateY(-3px);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, var(--medium-green) 0%, var(--light-green) 100%);
            color: var(--white);
            box-shadow: 0 8px 20px rgba(27, 94, 32, 0.3);
        }
        
        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(27, 94, 32, 0.4);
        }
        
        .btn-reset {
            background: linear-gradient(135deg, #C62828 0%, #B71C1C 100%);
            color: var(--white);
            box-shadow: 0 8px 20px rgba(183, 28, 28, 0.3);
        }
        
        .btn-reset:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(183, 28, 28, 0.4);
        }
        
        /* Dhikr Types - Luxury Grid */
        .dhikr-types {
            background: linear-gradient(135deg, rgba(30, 30, 30, 0.9) 0%, rgba(45, 45, 45, 0.7) 100%);
            border-radius: var(--border-radius);
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: var(--shadow-medium);
        }
        
        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            color: var(--light-gold);
            font-size: 1.3rem;
            font-weight: 600;
        }
        
        .section-title i {
            color: var(--primary-gold);
            font-size: 1.5rem;
        }
        
        .dhikr-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .dhikr-option {
            background: rgba(61, 61, 61, 0.5);
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90px;
            backdrop-filter: blur(5px);
        }
        
        .dhikr-option:hover {
            border-color: var(--primary-gold);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.2);
        }
        
        .dhikr-option.active {
            background: rgba(212, 175, 55, 0.15);
            border-color: var(--primary-gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        
        .dhikr-text {
            font-family: 'El Messiri', serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--light-gold);
            margin-bottom: 5px;
        }
        
        .dhikr-desc {
            font-size: 0.85rem;
            color: var(--primary-gold);
            opacity: 0.8;
            font-weight: 300;
        }
        
        /* Stats Section - Luxury */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
            padding: 15px;
            background: linear-gradient(135deg, rgba(30, 30, 30, 0.9) 0%, rgba(45, 45, 45, 0.7) 100%);
            border-radius: var(--border-radius);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        
        .stat-card {
            text-align: center;
            padding: 15px 5px;
            background: rgba(212, 175, 55, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        
        .stat-value {
            font-family: 'Tajawal', monospace;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary-gold);
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: var(--light-gold);
            opacity: 0.8;
            font-weight: 300;
            letter-spacing: 1px;
        }
        
        /* Share Buttons */
        .share-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0 10px;
        }
        
        .share-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 50px;
            padding: 8px 20px;
            color: var(--light-gold);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .share-btn:hover {
            background: var(--primary-gold);
            color: var(--black);
            border-color: var(--primary-gold);
        }
        
        /* Footer */
        .luxury-footer {
            padding: 15px;
            text-align: center;
            background: linear-gradient(180deg, rgba(18, 18, 18, 0.9) 0%, rgba(30, 30, 30, 0.9) 100%);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            position: relative;
            z-index: 10;
        }
        
        .footer-text {
            font-family: 'Tajawal', sans-serif;
            font-size: 0.9rem;
            color: var(--light-gold);
            opacity: 0.7;
            font-weight: 300;
            letter-spacing: 1px;
        }
        
        /* Scrollbar Styling */
        .main-content::-webkit-scrollbar {
            width: 6px;
        }
        
        .main-content::-webkit-scrollbar-track {
            background: rgba(30, 30, 30, 0.5);
            border-radius: 10px;
        }
        
        .main-content::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--primary-gold), var(--dark-gold));
            border-radius: 10px;
        }
        
        .main-content::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, var(--secondary-gold), var(--primary-gold));
        }
        
        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes glow {
            0% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
            50% { box-shadow: 0 0 40px rgba(212, 175, 55, 0.6); }
            100% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .pulse-effect {
            animation: pulse 0.3s ease;
        }
        
        .glow-effect {
            animation: glow 1s ease;
        }
        
        .slide-in {
            animation: slideIn 0.5s ease;
        }
        
        /* Loading Animation */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--black);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 1;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        
        .loading-overlay.hidden {
            opacity: 0;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(212, 175, 55, 0.3);
            border-top: 3px solid var(--primary-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            .counter-number {
                font-size: 5rem;
            }
            
            .current-dhikr {
                font-size: 1.6rem;
                min-height: 65px;
            }
            
            .luxury-btn {
                padding: 16px;
                font-size: 1rem;
            }
            
            .dhikr-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .dhikr-option {
                min-height: 85px;
                padding: 12px 8px;
            }
            
            .dhikr-text {
                font-size: 1.1rem;
            }
        }
        
        @media (max-width: 480px) {
            .luxury-header {
                padding: 15px 15px;
            }
            
            .app-title h1 {
                font-size: 1.8rem;
            }
            
            .counter-number {
                font-size: 4.5rem;
            }
            
            .current-dhikr {
                font-size: 1.4rem;
                min-height: 60px;
                padding: 12px;
            }
            
            .luxury-controls {
                grid-template-columns: 1fr;
            }
            
            .btn-primary {
                grid-column: span 1;
            }
            
            .dhikr-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-section {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .stat-card:nth-child(3) {
                grid-column: span 2;
            }
            
            .deceased-section {
                flex-wrap: wrap;
            }
            
            #deceasedNameInput {
                width: 140px;
            }
        }
        
        @media (max-height: 700px) {
            .main-content {
                padding: 15px;
            }
            
            .counter-display-section {
                padding: 15px;
            }
            
            .counter-number {
                font-size: 4rem;
                margin: 5px 0;
            }
            
            .current-dhikr {
                font-size: 1.3rem;
                min-height: 55px;
                margin: 10px 0;
            }
            
            .luxury-btn {
                padding: 14px;
            }
        }
        
        /* iOS Safe Area */
        @supports (padding: max(0px)) {
            .luxury-container {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
            }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>
    
    <div class="luxury-container">
        <div class="luxury-header">
            <div class="app-title">
                <h1><i class="fas fa-gem"></i> Tasbih Pro</h1>
                <p class="app-subtitle">مسبحة إلكترونية برو</p>
            </div>
            
            <!-- قسم اسم المتوفي -->
            <div class="deceased-section">
                <i class="fas fa-mosque"></i>
                <input type="text" id="deceasedNameInput" placeholder="اسم المتوفي" maxlength="30" value="">
                <button class="save-name-btn" id="saveDeceasedBtn"><i class="fas fa-check"></i> حفظ</button>
            </div>
        </div>
        
        <div class="main-content">
            <div class="counter-display-section slide-in">
                <div class="counter-label">
                    <i class="fas fa-crown"></i>
                    <span>عدد التسبيحات</span>
                </div>
                
                <div class="counter-number" id="counter">0</div>
                
                <div class="current-dhikr" id="currentDhikr">
                    سبحان الله
                </div>
                
                <!-- إهداء للمتوفي ديناميكي -->
                <div class="dedication-badge" id="dedicationMessage">
                    <i class="fas fa-hand-sparkles"></i>
                    <span id="dedicationText">اللهم اغفر للمسلمين والمسلمات</span>
                </div>
                
                <div class="luxury-controls">
                    <button class="luxury-btn btn-primary" id="countBtn">
                        <i class="fas fa-plus-circle"></i>
                        <span>تسبيح</span>
                    </button>
                    <button class="luxury-btn btn-secondary" id="undoBtn">
                        <i class="fas fa-undo-alt"></i>
                        <span>تراجع</span>
                    </button>
                    <button class="luxury-btn btn-reset" id="resetBtn">
                        <i class="fas fa-sync-alt"></i>
                        <span>إعادة تعيين</span>
                    </button>
                </div>
            </div>
            
            <div class="dhikr-types slide-in">
                <div class="section-title">
                    <i class="fas fa-star"></i>
                    <span>أنواع الذكر</span>
                </div>
                
                <div class="dhikr-grid" id="dhikrGrid">
                    <!-- سيتم تعبئتها بواسطة JavaScript -->
                </div>
            </div>
            
            <div class="stats-section slide-in">
                <div class="stat-card">
                    <div class="stat-value" id="completedCircles">0</div>
                    <div class="stat-label">دورات مكتملة</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="currentProgress">0/33</div>
                    <div class="stat-label">التقدم الحالي</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">المجموع الكلي</div>
                </div>
            </div>
            
            <!-- أزرار المشاركة -->
            <div class="share-buttons">
                <button class="share-btn" id="shareBtn"><i class="fab fa-facebook"></i> مشاركة</button>
                <button class="share-btn" id="copyLinkBtn"><i class="fas fa-link"></i> نسخ الرابط</button>
            </div>
        </div>
        
        <div class="luxury-footer">
            <p class="footer-text">الدعاء صدقة جارية للمتوفي</p>
        </div>
    </div>

    <script>
        // === Tasbih Pro - النسخة المحسنة مع جميع التحسينات ===
        (function() {
            'use strict';
            
            const TasbihApp = {
                // الحالة الأساسية
                state: {
                    count: 0,
                    totalCount: 0,
                    completedCircles: 0,
                    currentDhikr: 'سبحان الله',
                    dhikrHistory: [],
                    deceasedName: '',
                    dhikrTypes: [
                        { text: 'سبحان الله', desc: 'التسبيح', icon: 'fas fa-star' },
                        { text: 'الحمد لله', desc: 'التحميد', icon: 'fas fa-heart' },
                        { text: 'الله أكبر', desc: 'التكبير', icon: 'fas fa-sun' },
                        { text: 'لا إله إلا الله', desc: 'التوحيد', icon: 'fas fa-certificate' },
                        { text: 'أستغفر الله', desc: 'الاستغفار', icon: 'fas fa-hands-praying' },
                        { text: 'لا حول ولا قوة إلا بالله', desc: 'الحوقلة', icon: 'fas fa-shield-alt' }
                    ],
                    settings: {
                        sound: true,
                        vibration: true
                    }
                },
                
                // عناصر DOM
                elements: {},
                
                // Audio Context
                audioContext: null,
                audioInitialized: false,
                
                // ===== التهيئة =====
                init() {
                    this.cacheElements();
                    
                    // محاولة تحميل من URL أولاً
                    const urlLoaded = this.loadStateFromUrl();
                    
                    // إذا لم يوجد في URL، حمل من localStorage
                    if (!urlLoaded) {
                        this.loadStateFromStorage();
                    } else {
                        // إذا وجد في URL، دمج مع localStorage للحفاظ على العداد
                        this.mergeWithStorage();
                    }
                    
                    this.renderDhikrOptions();
                    this.updateDisplay();
                    this.updateDedicationMessage();
                    this.setupEventListeners();
                    this.setupAudio();
                    this.hideLoading();
                    this.updateUrlSilently();
                    
                    // إضافة Service Worker للتشغيل بدون إنترنت (اختياري)
                    this.registerServiceWorker();
                },
                
                // تخزين المراجع للعناصر
                cacheElements() {
                    const elementIds = [
                        'counter', 'currentDhikr', 'countBtn', 'undoBtn', 'resetBtn',
                        'completedCircles', 'currentProgress', 'totalCount', 'dhikrGrid',
                        'deceasedNameInput', 'saveDeceasedBtn', 'dedicationText', 
                        'shareBtn', 'copyLinkBtn', 'loadingOverlay'
                    ];
                    
                    elementIds.forEach(id => {
                        this.elements[id] = document.getElementById(id);
                    });
                },
                
                // ===== تحميل الحالة =====
                loadStateFromUrl() {
                    try {
                        const params = new URLSearchParams(window.location.search);
                        const deceasedParam = params.get('deceased');
                        
                        if (deceasedParam && deceasedParam.trim() !== '') {
                            // تعقيم النص - إزالة أي أحرف غير عربية
                            const rawText = decodeURIComponent(deceasedParam).trim();
                            // السماح فقط بالأحرف العربية والمسافات وبعض الرموز البسيطة
                            const sanitized = rawText.replace(/[^\u0600-\u06FF\s\u2000-\u200F\u202E]/g, '');
                            // تحديد الطول الأقصى
                            this.state.deceasedName = sanitized.substring(0, 30);
                            
                            if (this.elements.deceasedNameInput) {
                                this.elements.deceasedNameInput.value = this.state.deceasedName;
                            }
                            
                            return true; // تم التحميل من URL
                        }
                    } catch (e) {
                        console.warn('خطأ في تحميل البيانات من الرابط');
                    }
                    
                    return false;
                },
                
                loadStateFromStorage() {
                    try {
                        const saved = localStorage.getItem('tasbihProState');
                        if (saved) {
                            const data = JSON.parse(saved);
                            
                            this.state.count = data.count || 0;
                            this.state.totalCount = data.totalCount || 0;
                            this.state.completedCircles = data.completedCircles || 0;
                            this.state.currentDhikr = data.currentDhikr || 'سبحان الله';
                            this.state.dhikrHistory = Array.isArray(data.dhikrHistory) ? data.dhikrHistory.slice(-1000) : [];
                            this.state.deceasedName = data.deceasedName || '';
                            
                            if (this.elements.deceasedNameInput) {
                                this.elements.deceasedNameInput.value = this.state.deceasedName;
                            }
                        }
                    } catch (e) {
                        console.warn('خطأ في تحميل البيانات من التخزين المحلي');
                    }
                },
                
                // دمج مع localStorage (عند وجود اسم في URL)
                mergeWithStorage() {
                    try {
                        const saved = localStorage.getItem('tasbihProState');
                        if (saved) {
                            const data = JSON.parse(saved);
                            
                            // نحافظ على اسم المتوفي من URL، لكن نأخذ العداد من localStorage
                            this.state.count = data.count || 0;
                            this.state.totalCount = data.totalCount || 0;
                            this.state.completedCircles = data.completedCircles || 0;
                            this.state.currentDhikr = data.currentDhikr || 'سبحان الله';
                            this.state.dhikrHistory = Array.isArray(data.dhikrHistory) ? data.dhikrHistory.slice(-1000) : [];
                            
                            // اسم المتوفي يبقى من URL (لا نستبدله)
                        }
                    } catch (e) {
                        console.warn('خطأ في دمج البيانات');
                    }
                },
                
                // حفظ الحالة
                saveState() {
                    try {
                        // تحديد حجم التاريخ (آخر 1000 تسبيحة فقط)
                        const limitedHistory = this.state.dhikrHistory.slice(-1000);
                        
                        const data = {
                            count: this.state.count,
                            totalCount: this.state.totalCount,
                            completedCircles: this.state.completedCircles,
                            currentDhikr: this.state.currentDhikr,
                            dhikrHistory: limitedHistory,
                            deceasedName: this.state.deceasedName,
                            settings: this.state.settings,
                            timestamp: new Date().toISOString()
                        };
                        
                        // محاولة الحفظ مع معالجة خطأ سعة التخزين
                        try {
                            localStorage.setItem('tasbihProState', JSON.stringify(data));
                        } catch (storageError) {
                            if (storageError.name === 'QuotaExceededError') {
                                // إذا كان التخزين ممتلئاً، احذف التاريخ بالكامل وحاول مرة أخرى
                                data.dhikrHistory = [];
                                localStorage.setItem('tasbihProState', JSON.stringify(data));
                            } else {
                                throw storageError;
                            }
                        }
                        
                        this.updateUrlSilently();
                    } catch (e) {
                        console.warn('خطأ في حفظ البيانات');
                    }
                },
                
                // تحديث الرابط بدون إعادة تحميل
                updateUrlSilently() {
                    try {
                        const url = new URL(window.location.href.split('?')[0]);
                        
                        if (this.state.deceasedName && this.state.deceasedName.trim() !== '') {
                            // ترميز الاسم بأمان
                            url.searchParams.set('deceased', encodeURIComponent(this.state.deceasedName.trim()));
                        }
                        
                        window.history.replaceState({}, '', url);
                    } catch (e) {
                        console.warn('خطأ في تحديث الرابط');
                    }
                },
                
                // ===== إعداد الصوت =====
                setupAudio() {
                    try {
                        // إنشاء AudioContext ولكن لا نبدأ تشغيله حتى يتفاعل المستخدم
                        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        
                        // إعداد مستمع لأول تفاعل مستخدم
                        const initAudioOnUserInteraction = () => {
                            if (!this.audioInitialized && this.audioContext) {
                                if (this.audioContext.state === 'suspended') {
                                    this.audioContext.resume().then(() => {
                                        this.audioInitialized = true;
                                    }).catch(() => {});
                                } else {
                                    this.audioInitialized = true;
                                }
                            }
                            
                            // إزالة المستمعين بعد التهيئة
                            document.removeEventListener('click', initAudioOnUserInteraction);
                            document.removeEventListener('touchstart', initAudioOnUserInteraction);
                            document.removeEventListener('keydown', initAudioOnUserInteraction);
                        };
                        
                        document.addEventListener('click', initAudioOnUserInteraction);
                        document.addEventListener('touchstart', initAudioOnUserInteraction);
                        document.addEventListener('keydown', initAudioOnUserInteraction);
                        
                    } catch (e) {
                        console.log('الصوت غير مدعوم في هذا المتصفح');
                        this.audioContext = null;
                    }
                },
                
                // تشغيل الصوت المحسن
                playSound(frequency = 523.25, duration = 0.2) {
                    if (!this.state.settings.sound || !this.audioContext) return;
                    
                    try {
                        // التأكد من أن AudioContext نشط
                        if (this.audioContext.state === 'suspended') {
                            this.audioContext.resume().then(() => {
                                this._playOscillator(frequency, duration);
                            }).catch(() => {});
                            return;
                        }
                        
                        this._playOscillator(frequency, duration);
                    } catch (e) {
                        // تجاهل أخطاء الصوت
                    }
                },
                
                _playOscillator(frequency, duration) {
                    try {
                        const oscillator = this.audioContext.createOscillator();
                        const gainNode = this.audioContext.createGain();
                        
                        oscillator.connect(gainNode);
                        gainNode.connect(this.audioContext.destination);
                        
                        oscillator.frequency.value = frequency;
                        oscillator.type = 'sine';
                        
                        gainNode.gain.setValueAtTime(0.08, this.audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + duration);
                        
                        oscillator.start(this.audioContext.currentTime);
                        oscillator.stop(this.audioContext.currentTime + duration);
                    } catch (e) {
                        // تجاهل الأخطاء
                    }
                },
                
                // الاهتزاز
                vibrate(pattern = [50]) {
                    if (this.state.settings.vibration && navigator.vibrate) {
                        try {
                            navigator.vibrate(pattern);
                        } catch (e) {}
                    }
                },
                
                // ===== العمليات الرئيسية =====
                increment() {
                    // استخدام requestAnimationFrame لتحسين الأداء
                    requestAnimationFrame(() => {
                        const wasCircleComplete = (this.state.count + 1) % 33 === 0;
                        
                        this.state.count++;
                        this.state.totalCount++;
                        this.state.dhikrHistory.push(this.state.currentDhikr);
                        
                        // تأثير النبض
                        this.elements.counter.classList.add('pulse-effect');
                        setTimeout(() => {
                            this.elements.counter.classList.remove('pulse-effect');
                        }, 200);
                        
                        if (wasCircleComplete) {
                            this.state.completedCircles++;
                            this.playSound(659.25, 0.4); // صوت أعلى لإكمال الدورة
                            this.vibrate([100, 50, 100]);
                            
                            // تأثير التوهج
                            this.elements.counter.classList.add('glow-effect');
                            setTimeout(() => {
                                this.elements.counter.classList.remove('glow-effect');
                            }, 600);
                        } else {
                            this.playSound(523.25, 0.1);
                            this.vibrate([30]);
                        }
                        
                        this.updateDisplay();
                        this.saveState();
                    });
                },
                
                undo() {
                    if (this.state.count > 0) {
                        const wasCircleComplete = this.state.count % 33 === 0;
                        
                        this.state.count--;
                        this.state.totalCount--;
                        this.state.dhikrHistory.pop();
                        
                        // إذا كنا نتراجع عن آخر تسبيحة في دورة كاملة
                        if (wasCircleComplete && this.state.completedCircles > 0) {
                            this.state.completedCircles--;
                        }
                        
                        this.playSound(392.00, 0.1);
                        this.vibrate([30]);
                        
                        this.updateDisplay();
                        this.saveState();
                    }
                },
                
                reset() {
                    // حفظ الاسم قبل الإعادة
                    const currentDeceased = this.state.deceasedName;
                    
                    this.state.count = 0;
                    this.state.completedCircles = 0;
                    this.state.dhikrHistory = [];
                    
                    // استعادة الاسم بعد الإعادة
                    this.state.deceasedName = currentDeceased;
                    
                    // تأثيرات
                    this.elements.counter.classList.add('pulse-effect');
                    this.elements.currentDhikr.innerHTML = '<i class="fas fa-check-circle"></i> تم الإعادة بنجاح';
                    
                    setTimeout(() => {
                        this.elements.counter.classList.remove('pulse-effect');
                        this.elements.currentDhikr.textContent = this.state.currentDhikr;
                    }, 800);
                    
                    this.playSound(392.00, 0.2);
                    this.vibrate([100, 50, 100]);
                    
                    this.updateDisplay();
                    this.saveState();
                },
                
                changeDhikr(dhikrText) {
                    this.state.currentDhikr = dhikrText;
                    this.renderDhikrOptions();
                    this.updateDisplay();
                    this.saveState();
                    this.playSound(440.00, 0.1);
                },
                
                // حفظ اسم المتوفي
                saveDeceasedName() {
                    const newName = this.elements.deceasedNameInput.value.trim();
                    
                    // تعقيم النص
                    const sanitizedName = newName.replace(/[^\u0600-\u06FF\s\u2000-\u200F\u202E]/g, '').substring(0, 30);
                    
                    this.state.deceasedName = sanitizedName;
                    this.elements.deceasedNameInput.value = sanitizedName;
                    
                    this.updateDedicationMessage();
                    this.saveState();
                    
                    // تأثير بسيط
                    this.vibrate([30]);
                    
                    // إزالة التركيز من الحقل
                    this.elements.deceasedNameInput.blur();
                },
                
                // تحديث نص الإهداء
                updateDedicationMessage() {
                    if (this.elements.dedicationText) {
                        if (this.state.deceasedName && this.state.deceasedName.trim() !== '') {
                            this.elements.dedicationText.innerText = `الدعاء إلى روح ${this.state.deceasedName}`;
                        } else {
                            this.elements.dedicationText.innerText = 'اللهم اغفر للمسلمين والمسلمات';
                        }
                    }
                },
                
                // ===== العرض =====
                renderDhikrOptions() {
                    if (!this.elements.dhikrGrid) return;
                    
                    this.elements.dhikrGrid.innerHTML = '';
                    
                    this.state.dhikrTypes.forEach(dhikr => {
                        const option = document.createElement('div');
                        option.className = `dhikr-option ${this.state.currentDhikr === dhikr.text ? 'active' : ''}`;
                        option.innerHTML = `
                            <i class="${dhikr.icon}" style="color: var(--primary-gold); margin-bottom: 5px;"></i>
                            <div class="dhikr-text">${dhikr.text}</div>
                            <div class="dhikr-desc">${dhikr.desc}</div>
                        `;
                        
                        option.addEventListener('click', () => this.changeDhikr(dhikr.text));
                        
                        this.elements.dhikrGrid.appendChild(option);
                    });
                },
                
                updateDisplay() {
                    if (this.elements.counter) {
                        this.elements.counter.textContent = this.state.count;
                    }
                    
                    if (this.elements.currentDhikr) {
                        this.elements.currentDhikr.textContent = this.state.currentDhikr;
                    }
                    
                    if (this.elements.completedCircles) {
                        this.elements.completedCircles.textContent = this.state.completedCircles;
                    }
                    
                    if (this.elements.currentProgress) {
                        this.elements.currentProgress.textContent = `${this.state.count % 33}/33`;
                    }
                    
                    if (this.elements.totalCount) {
                        this.elements.totalCount.textContent = this.state.totalCount;
                    }
                },
                
                // ===== المشاركة =====
                getShareUrl() {
                    const baseUrl = window.location.href.split('?')[0];
                    
                    if (this.state.deceasedName && this.state.deceasedName.trim() !== '') {
                        return `${baseUrl}?deceased=${encodeURIComponent(this.state.deceasedName.trim())}`;
                    }
                    
                    return baseUrl;
                },
                
                share() {
                    const shareUrl = this.getShareUrl();
                    
                    if (navigator.share) {
                        navigator.share({
                            title: 'Tasbih Pro - مسبحة إلكترونية',
                            text: this.state.deceasedName ? `الدعاء إلى روح ${this.state.deceasedName}` : 'مسبحة إلكترونية فاخرة',
                            url: shareUrl
                        }).catch(() => {
                            // إذا فشلت المشاركة، انسخ الرابط كبديل
                            this.copyToClipboard(shareUrl);
                            alert('تم نسخ رابط المشاركة');
                        });
                    } else {
                        this.copyToClipboard(shareUrl);
                        alert('تم نسخ رابط المشاركة');
                    }
                },
                
                copyLink() {
                    this.copyToClipboard(this.getShareUrl());
                    alert('تم نسخ رابط المشاركة');
                },
                
                copyToClipboard(text) {
                    if (navigator.clipboard) {
                        navigator.clipboard.writeText(text).catch(() => {
                            this.fallbackCopy(text);
                        });
                    } else {
                        this.fallbackCopy(text);
                    }
                },
                
                fallbackCopy(text) {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.style.position = 'fixed';
                    textarea.style.opacity = '0';
                    document.body.appendChild(textarea);
                    textarea.select();
                    
                    try {
                        document.execCommand('copy');
                    } catch (err) {}
                    
                    document.body.removeChild(textarea);
                },
                
                // ===== إعداد الأحداث =====
                setupEventListeners() {
                    // الأزرار الرئيسية
                    this.elements.countBtn?.addEventListener('click', (e) => {
                        e.preventDefault();
                        this.increment();
                    });
                    
                    this.elements.undoBtn?.addEventListener('click', (e) => {
                        e.preventDefault();
                        this.undo();
                    });
                    
                    this.elements.resetBtn?.addEventListener('click', (e) => {
                        e.preventDefault();
                        this.reset();
                    });
                    
                    // النقر على العداد للتسبيح
                    this.elements.counter?.addEventListener('click', (e) => {
                        e.preventDefault();
                        this.increment();
                    });
                    
                    // حفظ اسم المتوفي
                    this.elements.saveDeceasedBtn?.addEventListener('click', () => {
                        this.saveDeceasedName();
                    });
                    
                    // حفظ بالضغط على Enter
                    this.elements.deceasedNameInput?.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            this.saveDeceasedName();
                        }
                    });
                    
                    // أزرار المشاركة
                    this.elements.shareBtn?.addEventListener('click', () => this.share());
                    this.elements.copyLinkBtn?.addEventListener('click', () => this.copyLink());
                    
                    // اختصارات لوحة المفاتيح
                    document.addEventListener('keydown', (e) => {
                        // منع السلوك الافتراضي للصفحة
                        if (e.code === 'Space' || e.code === 'Enter' || 
                            (e.code === 'KeyZ' && (e.ctrlKey || e.metaKey)) ||
                            e.code === 'KeyR') {
                            
                            // تجاهل إذا كان المستخدم يكتب في حقل النص
                            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                                return;
                            }
                            
                            e.preventDefault();
                            
                            switch(e.code) {
                                case 'Space':
                                case 'Enter':
                                    this.increment();
                                    break;
                                case 'KeyZ':
                                    if (e.ctrlKey || e.metaKey) {
                                        this.undo();
                                    }
                                    break;
                                case 'KeyR':
                                    this.reset();
                                    break;
                            }
                        }
                    });
                    
                    // منع التكبير باللمس
                    document.addEventListener('gesturestart', (e) => {
                        e.preventDefault();
                    });
                    
                    // تحسين التمرير على الجوال
                    const content = document.querySelector('.main-content');
                    if (content) {
                        content.addEventListener('touchstart', () => {
                            content.style.overflowY = 'auto';
                        });
                    }
                },
                
                // ===== Service Worker (للتشغيل بدون إنترنت) =====
                registerServiceWorker() {
                    if ('serviceWorker' in navigator && location.protocol === 'https:') {
                        window.addEventListener('load', () => {
                            // هذا اختياري - يمكن إضافة ملف service worker لاحقاً
                            // navigator.serviceWorker.register('/sw.js').catch(err => {});
                        });
                    }
                },
                
                // إخفاء شاشة التحميل
                hideLoading() {
                    setTimeout(() => {
                        if (this.elements.loadingOverlay) {
                            this.elements.loadingOverlay.classList.add('hidden');
                        }
                    }, 600);
                }
            };
            
            // بدء التطبيق
            document.addEventListener('DOMContentLoaded', () => {
                TasbihApp.init();
            });
            
            // معالجة تغيير حجم الشاشة
            window.addEventListener('resize', () => {
                document.documentElement.style.height = `${window.innerHeight}px`;
            });
            
            window.dispatchEvent(new Event('resize'));
        })();
    </script>
