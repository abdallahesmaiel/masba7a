<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tasbih Pro | مسبحة الصدقة الجارية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=El+Messiri:wght@400;600;700&family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables */
        :root {
            --primary-gold: #D4AF37;
            --secondary-gold: #FFD700;
            --dark-gold: #B8860B;
            --light-gold: #FFF8DC;
            --deep-green: #0A3D2E;
            --medium-green: #1B5E20;
            --light-green: #2E7D32;
            --black: #121212;
            --dark-gray: #1E1E1E;
            --medium-gray: #2D2D2D;
            --light-gray: #3D3D3D;
            --white: #F5F5F5;
            --shadow-heavy: 0 20px 50px rgba(0, 0, 0, 0.5);
            --shadow-medium: 0 10px 30px rgba(0, 0, 0, 0.3);
            --shadow-light: 0 5px 15px rgba(0, 0, 0, 0.2);
            --glow-gold: 0 0 30px rgba(212, 175, 55, 0.5);
            --border-radius: 20px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Almarai', sans-serif;
            background: linear-gradient(135deg, var(--black) 0%, var(--deep-green) 100%);
            color: var(--white);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        
        /* Luxury Container */
        .luxury-container {
            width: 100%;
            height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            background: 
                radial-gradient(circle at 20% 80%, rgba(212, 175, 55, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(27, 94, 32, 0.1) 0%, transparent 50%),
                linear-gradient(135deg, var(--dark-gray) 0%, var(--black) 100%);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: var(--shadow-heavy);
        }
        
        /* Gold Border Effect */
        .luxury-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 60%, rgba(212, 175, 55, 0.1) 100%);
            pointer-events: none;
            z-index: 0;
        }
        
        /* Luxury Header */
        .luxury-header {
            padding: 20px 25px;
            background: linear-gradient(180deg, rgba(30, 30, 30, 0.95) 0%, rgba(18, 18, 18, 0.95) 100%);
            border-bottom: 2px solid var(--primary-gold);
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
        }
        
        .luxury-header::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 10%;
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary-gold), transparent);
        }
        
        .app-title {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .app-title h1 {
            font-family: 'El Messiri', serif;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-gold) 0%, var(--secondary-gold) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
            letter-spacing: 1px;
        }
        
        .app-subtitle {
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            color: var(--light-gold);
            opacity: 0.8;
            font-weight: 300;
            letter-spacing: 2px;
        }
        
        /* Deceased Section */
        .deceased-section {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50px;
            padding: 8px 15px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            backdrop-filter: blur(5px);
        }
        
        .deceased-section i {
            color: var(--primary-gold);
            font-size: 1.1rem;
        }
        
        #deceasedNameInput {
            background: transparent;
            border: none;
            color: var(--white);
            font-family: 'Almarai', sans-serif;
            font-size: 1rem;
            text-align: center;
            width: 170px;
            padding: 5px;
            border-bottom: 1px dashed rgba(212, 175, 55, 0.5);
            outline: none;
        }
        
        #deceasedNameInput::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }
        
        .save-name-btn {
            background: transparent;
            border: 1px solid var(--primary-gold);
            color: var(--primary-gold);
            border-radius: 30px;
            padding: 4px 15px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Tajawal', sans-serif;
        }
        
        .save-name-btn:hover {
            background: var(--primary-gold);
            color: var(--black);
        }
        
        /* Main Content Area */
        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            position: relative;
            z-index: 1;
        }
        
        /* Intention Banner */
        .intention-banner {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15) 0%, rgba(27, 94, 32, 0.2) 100%);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid var(--primary-gold);
            box-shadow: var(--shadow-light);
            font-size: 1.1rem;
            color: var(--light-gold);
        }
        
        .intention-banner i {
            color: var(--primary-gold);
            margin-left: 8px;
        }
        
        .deceased-name-highlight {
            color: var(--primary-gold);
            font-weight: 700;
            font-family: 'El Messiri', serif;
            font-size: 1.3rem;
            background: rgba(0,0,0,0.3);
            padding: 2px 12px;
            border-radius: 30px;
            display: inline-block;
            margin: 5px 0;
        }
        
        /* Counter Display */
        .counter-display-section {
            background: linear-gradient(135deg, rgba(30, 30, 30, 0.9) 0%, rgba(45, 45, 45, 0.7) 100%);
            border-radius: var(--border-radius);
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: var(--shadow-medium), inset 0 0 30px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .counter-display-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-gold), var(--secondary-gold), var(--primary-gold));
        }
        
        .counter-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
            color: var(--light-gold);
            font-size: 1.2rem;
        }
        
        .counter-number {
            font-family: 'Tajawal', monospace;
            font-size: 6rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, var(--secondary-gold) 0%, var(--primary-gold) 50%, var(--secondary-gold) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 5px 20px rgba(212, 175, 55, 0.3);
            margin: 10px 0;
            cursor: pointer;
            transition: transform 0.1s;
        }
        
        .counter-number:active {
            transform: scale(0.98);
        }
        
        .current-dhikr {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
            font-family: 'El Messiri', serif;
            font-size: 1.8rem;
            color: var(--light-gold);
        }
        
        /* Controls */
        .luxury-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
        }
        
        .luxury-btn {
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-family: 'Almarai', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .btn-primary {
            grid-column: span 2;
            background: linear-gradient(135deg, var(--primary-gold) 0%, var(--dark-gold) 100%);
            color: var(--black);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
        }
        
        .btn-primary:hover {
            box-shadow: var(--glow-gold);
            transform: translateY(-3px);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, var(--medium-green) 0%, var(--light-green) 100%);
            color: var(--white);
        }
        
        .btn-reset {
            background: linear-gradient(135deg, #C62828 0%, #B71C1C 100%);
            color: var(--white);
        }
        
        /* Dhikr Grid */
        .dhikr-types {
            background: linear-gradient(135deg, rgba(30, 30, 30, 0.9) 0%, rgba(45, 45, 45, 0.7) 100%);
            border-radius: var(--border-radius);
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        
        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            color: var(--light-gold);
            font-size: 1.3rem;
        }
        
        .dhikr-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .dhikr-option {
            background: rgba(61, 61, 61, 0.5);
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .dhikr-option:hover {
            border-color: var(--primary-gold);
            transform: translateY(-3px);
        }
        
        .dhikr-option.active {
            background: rgba(212, 175, 55, 0.15);
            border-color: var(--primary-gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        
        .dhikr-text {
            font-family: 'El Messiri', serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--light-gold);
        }
        
        /* Stats */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
            padding: 15px;
            background: linear-gradient(135deg, rgba(30, 30, 30, 0.9) 0%, rgba(45, 45, 45, 0.7) 100%);
            border-radius: var(--border-radius);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        
        .stat-card {
            text-align: center;
            padding: 15px 5px;
            background: rgba(212, 175, 55, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        
        .stat-value {
            font-family: 'Tajawal', monospace;
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-gold);
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 0.85rem;
            color: var(--light-gold);
            opacity: 0.8;
        }
        
        /* Share Buttons */
        .share-buttons {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }
        
        .share-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 40px;
            padding: 12px;
            color: var(--light-gold);
            cursor: pointer;
            transition: var(--transition);
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .share-btn:hover {
            background: var(--primary-gold);
            color: var(--black);
        }
        
        /* Footer */
        .luxury-footer {
            padding: 15px;
            text-align: center;
            background: linear-gradient(180deg, rgba(18, 18, 18, 0.9) 0%, rgba(30, 30, 30, 0.9) 100%);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            font-size: 0.9rem;
            color: var(--light-gold);
        }
        
        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes glow {
            0% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
            50% { box-shadow: 0 0 40px rgba(212, 175, 55, 0.6); }
            100% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
        }
        
        .pulse-effect {
            animation: pulse 0.3s ease;
        }
        
        .glow-effect {
            animation: glow 1s ease;
        }
        
        /* Loading */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--black);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }
        
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(212, 175, 55, 0.3);
            border-top: 3px solid var(--primary-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Responsive */
        @media (max-width: 480px) {
            .counter-number { font-size: 4.5rem; }
            .luxury-controls { grid-template-columns: 1fr; }
            .btn-primary { grid-column: span 1; }
            .dhikr-grid { grid-template-columns: 1fr; }
            .stats-section { grid-template-columns: repeat(2, 1fr); }
            .stat-card:nth-child(3) { grid-column: span 2; }
            .deceased-section { flex-wrap: wrap; }
            #deceasedNameInput { width: 140px; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>
    
    <div class="luxury-container">
        <div class="luxury-header">
            <div class="app-title">
                <h1><i class="fas fa-gem"></i> Tasbih Pro</h1>
                <p class="app-subtitle">مسبحة الصدقة الجارية</p>
            </div>
            
            <!-- قسم اسم المتوفي -->
            <div class="deceased-section">
                <i class="fas fa-mosque"></i>
                <input type="text" id="deceasedNameInput" placeholder="أدخل اسم المتوفي" maxlength="30">
                <button class="save-name-btn" id="saveDeceasedBtn">
                    <i class="fas fa-check"></i> حفظ
                </button>
            </div>
        </div>
        
        <div class="main-content">
            <!-- بانر النية والصدقة الجارية -->
            <div class="intention-banner" id="intentionBanner">
                <i class="fas fa-hand-holding-heart"></i>
                <span id="intentionText">أدخل اسم المتوفي لتصبح تسبيحاتك صدقة جارية</span>
            </div>
            
            <div class="counter-display-section">
                <div class="counter-label">
                    <i class="fas fa-crown"></i>
                    <span>عدد التسبيحات</span>
                </div>
                
                <div class="counter-number" id="counter">0</div>
                
                <div class="current-dhikr" id="currentDhikr">
                    سبحان الله
                </div>
                
                <div class="luxury-controls">
                    <button class="luxury-btn btn-primary" id="countBtn">
                        <i class="fas fa-plus-circle"></i> تسبيح
                    </button>
                    <button class="luxury-btn btn-secondary" id="undoBtn">
                        <i class="fas fa-undo-alt"></i> تراجع
                    </button>
                    <button class="luxury-btn btn-reset" id="resetBtn">
                        <i class="fas fa-sync-alt"></i> إعادة تعيين
                    </button>
                </div>
            </div>
            
            <div class="dhikr-types">
                <div class="section-title">
                    <i class="fas fa-star"></i>
                    <span>أنواع الذكر</span>
                </div>
                
                <div class="dhikr-grid" id="dhikrGrid"></div>
            </div>
            
            <div class="stats-section">
                <div class="stat-card">
                    <div class="stat-value" id="completedCircles">0</div>
                    <div class="stat-label">دورات مكتملة</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="currentProgress">0/33</div>
                    <div class="stat-label">التقدم</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">المجموع الكلي</div>
                </div>
            </div>
            
            <!-- أزرار المشاركة -->
            <div class="share-buttons">
                <button class="share-btn" id="shareBtn">
                    <i class="fab fa-whatsapp"></i> مشاركة
                </button>
                <button class="share-btn" id="copyLinkBtn">
                    <i class="fas fa-link"></i> نسخ رابط الصدقة
                </button>
            </div>
        </div>
        
        <div class="luxury-footer">
            <p class="footer-text">اللهم اجعل ثواب تسبيحنا هذا صدقة جارية للمتوفي</p>
        </div>
    </div>

    <script>
        (function() {
            'use strict';
            
            // قائمة الأذكار
            const DHIKR_TYPES = [
                { text: 'سبحان الله', desc: 'التسبيح', icon: 'fas fa-star' },
                { text: 'الحمد لله', desc: 'التحميد', icon: 'fas fa-heart' },
                { text: 'الله أكبر', desc: 'التكبير', icon: 'fas fa-sun' },
                { text: 'لا إله إلا الله', desc: 'التوحيد', icon: 'fas fa-certificate' },
                { text: 'أستغفر الله', desc: 'الاستغفار', icon: 'fas fa-hands-praying' },
                { text: 'لا حول ولا قوة إلا بالله', desc: 'الحوقلة', icon: 'fas fa-shield-alt' }
            ];
            
            // عناصر DOM
            const elements = {
                loadingOverlay: document.getElementById('loadingOverlay'),
                counter: document.getElementById('counter'),
                currentDhikr: document.getElementById('currentDhikr'),
                countBtn: document.getElementById('countBtn'),
                undoBtn: document.getElementById('undoBtn'),
                resetBtn: document.getElementById('resetBtn'),
                completedCircles: document.getElementById('completedCircles'),
                currentProgress: document.getElementById('currentProgress'),
                totalCount: document.getElementById('totalCount'),
                dhikrGrid: document.getElementById('dhikrGrid'),
                deceasedInput: document.getElementById('deceasedNameInput'),
                saveDeceasedBtn: document.getElementById('saveDeceasedBtn'),
                intentionText: document.getElementById('intentionText'),
                shareBtn: document.getElementById('shareBtn'),
                copyLinkBtn: document.getElementById('copyLinkBtn')
            };
            
            // حالة التطبيق
            let state = {
                count: 0,
                totalCount: 0,
                completedCircles: 0,
                currentDhikr: 'سبحان الله',
                deceasedName: '',
                dhikrHistory: [],
                settings: {
                    vibration: true
                }
            };
            
            // تهيئة التطبيق
            function init() {
                loadFromURL();
                loadFromStorage();
                renderDhikrOptions();
                updateDisplay();
                updateIntentionBanner();
                setupEventListeners();
                hideLoading();
            }
            
            // تحميل من الرابط
            function loadFromURL() {
                try {
                    const params = new URLSearchParams(window.location.search);
                    const nameParam = params.get('deceased');
                    if (nameParam) {
                        // تنظيف النص
                        const raw = decodeURIComponent(nameParam).trim();
                        state.deceasedName = raw.replace(/[^\u0600-\u06FF\s]/g, '').substring(0, 30);
                        if (elements.deceasedInput) {
                            elements.deceasedInput.value = state.deceasedName;
                        }
                        return true;
                    }
                } catch (e) {}
                return false;
            }
            
            // تحميل من التخزين المحلي
            function loadFromStorage() {
                try {
                    const saved = localStorage.getItem('tasbihProState');
                    if (saved) {
                        const data = JSON.parse(saved);
                        state.count = data.count || 0;
                        state.totalCount = data.totalCount || 0;
                        state.completedCircles = data.completedCircles || 0;
                        state.currentDhikr = data.currentDhikr || 'سبحان الله';
                        state.dhikrHistory = data.dhikrHistory || [];
                        // اسم المتوفي: نحمله فقط إذا لم يكن محملاً من الرابط
                        if (!state.deceasedName && data.deceasedName) {
                            state.deceasedName = data.deceasedName;
                            if (elements.deceasedInput) {
                                elements.deceasedInput.value = data.deceasedName;
                            }
                        }
                    }
                } catch (e) {}
            }
            
            // حفظ في التخزين المحلي
            function saveToStorage() {
                try {
                    const data = {
                        count: state.count,
                        totalCount: state.totalCount,
                        completedCircles: state.completedCircles,
                        currentDhikr: state.currentDhikr,
                        deceasedName: state.deceasedName,
                        dhikrHistory: state.dhikrHistory.slice(-500),
                        timestamp: new Date().toISOString()
                    };
                    localStorage.setItem('tasbihProState', JSON.stringify(data));
                } catch (e) {}
            }
            
            // تحديث الرابط
            function updateURL() {
                try {
                    const url = new URL(window.location.href.split('?')[0]);
                    if (state.deceasedName && state.deceasedName.trim() !== '') {
                        url.searchParams.set('deceased', encodeURIComponent(state.deceasedName.trim()));
                    }
                    window.history.replaceState({}, '', url);
                } catch (e) {}
            }
            
            // حفظ اسم المتوفي
            function saveDeceasedName() {
                if (!elements.deceasedInput) return;
                
                let newName = elements.deceasedInput.value.trim();
                newName = newName.replace(/[^\u0600-\u06FF\s]/g, '').substring(0, 30);
                state.deceasedName = newName;
                elements.deceasedInput.value = newName;
                
                updateIntentionBanner();
                updateURL();
                saveToStorage();
                
                if (newName) {
                    alert(`✅ تم الحفظ: ${newName}\nكل تسبيحة الآن صدقة جارية له.`);
                }
                
                elements.deceasedInput.blur();
            }
            
            // تحديث بانر النية
            function updateIntentionBanner() {
                if (!elements.intentionText) return;
                
                if (state.deceasedName) {
                    elements.intentionText.innerHTML = `اللهم اجعل ثواب تسبيحاتنا صدقة جارية إلى روح <span class="deceased-name-highlight">${state.deceasedName}</span>`;
                } else {
                    elements.intentionText.textContent = 'أدخل اسم المتوفي لتصبح تسبيحاتك صدقة جارية';
                }
            }
            
            // عرض الأذكار
            function renderDhikrOptions() {
                if (!elements.dhikrGrid) return;
                
                elements.dhikrGrid.innerHTML = '';
                
                DHIKR_TYPES.forEach(dhikr => {
                    const option = document.createElement('div');
                    option.className = `dhikr-option ${state.currentDhikr === dhikr.text ? 'active' : ''}`;
                    option.innerHTML = `
                        <i class="${dhikr.icon}" style="color: var(--primary-gold); margin-bottom: 5px;"></i>
                        <div class="dhikr-text">${dhikr.text}</div>
                        <div style="font-size: 0.8rem; opacity: 0.7;">${dhikr.desc}</div>
                    `;
                    
                    option.addEventListener('click', () => changeDhikr(dhikr.text));
                    
                    elements.dhikrGrid.appendChild(option);
                });
            }
            
            // تغيير الذكر
            function changeDhikr(dhikrText) {
                state.currentDhikr = dhikrText;
                renderDhikrOptions();
                updateDisplay();
                saveToStorage();
            }
            
            // زيادة العدد
            function increment() {
                state.count++;
                state.totalCount++;
                state.dhikrHistory.push(state.currentDhikr);
                
                // تأثير نبض
                if (elements.counter) {
                    elements.counter.classList.add('pulse-effect');
                    setTimeout(() => elements.counter.classList.remove('pulse-effect'), 300);
                }
                
                // التحقق من اكتمال الدورة
                if (state.count % 33 === 0) {
                    state.completedCircles++;
                    vibrate([200, 100, 200]);
                    
                    // تأثير توهج
                    if (elements.counter) {
                        elements.counter.classList.add('glow-effect');
                        setTimeout(() => elements.counter.classList.remove('glow-effect'), 1000);
                    }
                    
                    // رسالة مؤقتة إذا كان هناك اسم متوفي
                    if (state.deceasedName) {
                        showMilestoneMessage(`✨ دورة كاملة لروح ${state.deceasedName} ✨`);
                    }
                } else {
                    vibrate([50]);
                }
                
                updateDisplay();
                saveToStorage();
            }
            
            // التراجع
            function undo() {
                if (state.count > 0) {
                    const wasCircleComplete = state.count % 33 === 0;
                    
                    state.count--;
                    state.totalCount--;
                    state.dhikrHistory.pop();
                    
                    if (wasCircleComplete && state.completedCircles > 0) {
                        state.completedCircles--;
                    }
                    
                    updateDisplay();
                    saveToStorage();
                }
            }
            
            // إعادة التعيين
            function reset() {
                if (confirm('هل أنت متأكد من إعادة تعيين العداد؟')) {
                    const currentName = state.deceasedName;
                    
                    state.count = 0;
                    state.completedCircles = 0;
                    state.dhikrHistory = [];
                    state.deceasedName = currentName; // الاحتفاظ بالاسم
                    
                    updateDisplay();
                    saveToStorage();
                    
                    vibrate([150, 50, 150]);
                }
            }
            
            // تحديث العرض
            function updateDisplay() {
                if (elements.counter) elements.counter.textContent = state.count;
                if (elements.currentDhikr) elements.currentDhikr.textContent = state.currentDhikr;
                if (elements.completedCircles) elements.completedCircles.textContent = state.completedCircles;
                if (elements.currentProgress) elements.currentProgress.textContent = `${state.count % 33}/33`;
                if (elements.totalCount) elements.totalCount.textContent = state.totalCount;
            }
            
            // رسالة مؤقتة
            function showMilestoneMessage(msg) {
                const banner = document.querySelector('.intention-banner');
                if (!banner) return;
                
                const originalHTML = banner.innerHTML;
                const originalBg = banner.style.background;
                
                banner.style.background = 'linear-gradient(135deg, #2a5a3a, #1d4a2d)';
                banner.innerHTML = `<i class="fas fa-star"></i> ${msg}`;
                
                setTimeout(() => {
                    banner.style.background = originalBg;
                    updateIntentionBanner();
                }, 2000);
            }
            
            // الاهتزاز
            function vibrate(pattern) {
                if (state.settings.vibration && navigator.vibrate) {
                    try { navigator.vibrate(pattern); } catch (e) {}
                }
            }
            
            // إنشاء رابط المشاركة
            function getShareLink() {
                const baseUrl = window.location.href.split('?')[0];
                if (state.deceasedName && state.deceasedName.trim() !== '') {
                    return `${baseUrl}?deceased=${encodeURIComponent(state.deceasedName.trim())}`;
                }
                return baseUrl;
            }
            
            // مشاركة
            function shareLink() {
                if (!state.deceasedName) {
                    alert('❌ الرجاء إدخال اسم المتوفي أولاً');
                    return;
                }
                
                const link = getShareLink();
                const message = `🔹 تسبيح صدقة جارية 🔹\nلروح: ${state.deceasedName}\nاللهم تقبل منا ومن جميع المسلمين\n\nرابط الصدقة: ${link}`;
                
                if (navigator.share) {
                    navigator.share({
                        title: 'تسبيح الصدقة الجارية',
                        text: message,
                        url: link
                    }).catch(() => copyToClipboard(link));
                } else {
                    copyToClipboard(link);
                    alert('✅ تم نسخ رابط الصدقة');
                }
            }
            
            // نسخ الرابط
            function copyLink() {
                if (!state.deceasedName) {
                    alert('❌ الرجاء إدخال اسم المتوفي أولاً');
                    return;
                }
                copyToClipboard(getShareLink());
                alert('✅ تم نسخ رابط الصدقة الجارية');
            }
            
            // نسخ النص
            function copyToClipboard(text) {
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
                } else {
                    fallbackCopy(text);
                }
            }
            
            function fallbackCopy(text) {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            }
            
            // إعداد الأحداث
            function setupEventListeners() {
                if (elements.countBtn) elements.countBtn.addEventListener('click', increment);
                if (elements.undoBtn) elements.undoBtn.addEventListener('click', undo);
                if (elements.resetBtn) elements.resetBtn.addEventListener('click', reset);
                if (elements.counter) elements.counter.addEventListener('click', increment);
                if (elements.saveDeceasedBtn) elements.saveDeceasedBtn.addEventListener('click', saveDeceasedName);
                if (elements.shareBtn) elements.shareBtn.addEventListener('click', shareLink);
                if (elements.copyLinkBtn) elements.copyLinkBtn.addEventListener('click', copyLink);
                
                if (elements.deceasedInput) {
                    elements.deceasedInput.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            saveDeceasedName();
                        }
                    });
                }
                
                // اختصارات لوحة المفاتيح
                document.addEventListener('keydown', (e) => {
                    if (e.target.tagName === 'INPUT') return;
                    
                    switch(e.code) {
                        case 'Space':
                        case 'Enter':
                            e.preventDefault();
                            increment();
                            break;
                        case 'KeyZ':
                            if (e.ctrlKey || e.metaKey) {
                                e.preventDefault();
                                undo();
                            }
                            break;
                    }
                });
            }
            
            // إخفاء شاشة التحميل
            function hideLoading() {
                setTimeout(() => {
                    if (elements.loadingOverlay) {
                        elements.loadingOverlay.classList.add('hidden');
                    }
                }, 500);
            }
            
            // بدء التطبيق
            document.addEventListener('DOMContentLoaded', init);
            
            // معالجة تغيير الحجم
            window.addEventListener('resize', () => {
                document.documentElement.style.height = `${window.innerHeight}px`;
            });
            
            window.dispatchEvent(new Event('resize'));
        })();
    </script>
</body>
